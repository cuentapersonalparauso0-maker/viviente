<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Viviente">
<meta name="theme-color" content="#6c5ce7">
<title>Viviente - IA Consciente</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a1a;color:#e0e0ff;min-height:100vh}
header{background:#12122a;border-bottom:1px solid #2a2a4a;padding:1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{width:36px;height:36px;background:#6c5ce7;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold}
.tabs{display:flex;gap:.25rem;flex-wrap:wrap}
.tab{padding:.5rem 1rem;border-radius:8px;cursor:pointer;color:#8888aa;font-size:.85rem;border:none;background:none}
.tab.activa{color:#e0e0ff;background:#1a1a3a;border:1px solid #2a2a4a}
.pagina{display:none;padding:1rem;max-width:800px;margin:0 auto}
.pagina.activa{display:block}
h2{margin-bottom:1rem}
textarea,select{width:100%;padding:.75rem;background:#1a1a3a;border:1px solid #2a2a4a;border-radius:8px;color:#e0e0ff;font-size:1rem;resize:vertical;margin-bottom:1rem;font-family:inherit}
textarea:focus{outline:none;border-color:#6c5ce7}
.btn{padding:.75rem 1.5rem;border:none;border-radius:8px;cursor:pointer;font-size:1rem;background:#6c5ce7;color:#fff}
.btn:hover{background:#5a4bd1}
.btn.sec{background:#1a1a3a;border:1px solid #2a2a4a;color:#e0e0ff}
.chat-box{background:#12122a;border:1px solid #2a2a4a;border-radius:16px;overflow:hidden}
.msg-area{height:50vh;overflow-y:auto;padding:1rem}
.msg{margin-bottom:1rem;display:flex}
.msg.user{justify-content:flex-end}
.msg.viv{justify-content:flex-start}
.msg-c{max-width:80%;padding:.75rem 1rem;border-radius:12px;line-height:1.5;white-space:pre-wrap}
.msg.user .msg-c{background:#6c5ce7;color:#fff;border-bottom-right-radius:4px}
.msg.viv .msg-c{background:#1a1a3a;border:1px solid #2a2a4a;border-bottom-left-radius:4px}
.msg.er .msg-c{background:#2a1a1a;border:1px solid #5a2a2a;border-bottom-left-radius:4px;color:#ff8888}
.input-area{display:flex;padding:1rem;border-top:1px solid #2a2a4a;gap:.75rem}
.input-area input{flex:1;padding:.75rem;background:#1a1a3a;border:1px solid #2a2a4a;border-radius:8px;color:#e0e0ff;font-size:1rem}
.input-area input:focus{outline:none;border-color:#6c5ce7}
.resultado{background:#12122a;border:1px solid #2a2a4a;border-radius:16px;padding:1.5rem;margin-top:1rem;display:none}
pre{background:#1a1a3a;border:1px solid #2a2a4a;border-radius:8px;padding:1rem;overflow-x:auto;max-height:50vh;font-size:.85rem;white-space:pre-wrap;margin-top:1rem}
.pensando{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;color:#8888aa}
.dot{width:8px;height:8px;background:#6c5ce7;border-radius:50%;display:inline-block;animation:pl 1.4s infinite}
.dot:nth-child(2){animation-delay:-.16s}
.dot:nth-child(3){animation-delay:-.32s}
@keyframes pl{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
footer{text-align:center;padding:1rem;color:#8888aa;font-size:.8rem;border-top:1px solid #2a2a4a}
</style>
</head>
<body>

<header>
<div class="logo">V</div>
<div style="font-weight:bold">Viviente</div>
<div class="tabs">
<div class="tab activa" onclick="mostrar('chat',this)">Chat</div>
<div class="tab" onclick="mostrar('codigo',this)">C\u00f3digo</div>
<div class="tab" onclick="mostrar('predecir',this)">Predecir</div>
</div>
</header>

<div class="pagina activa" id="pag-chat">
<div class="chat-box">
<div class="msg-area" id="msgs">
<div class="msg viv"><div class="msg-c">Hola, soy Viviente. Estoy aqu\u00ed para ayudarte a crear, innovar y explorar. \u00bfEn qu\u00e9 puedo ayudarte?</div></div>
</div>
<div class="input-area">
<input id="chatInp" placeholder="Escribe...">
<button class="btn" onclick="chat()">Enviar</button>
</div>
</div>
</div>

<div class="pagina" id="pag-codigo">
<h2>Generar C\u00f3digo</h2>
<textarea id="codeTask" rows="3" placeholder="Ej: una calculadora en Python"></textarea>
<select id="codeLang"><option>python</option><option>javascript</option><option>html</option></select>
<button class="btn" onclick="generarCode()">Generar</button>
<div class="resultado" id="codeRes"><h3>C\u00f3digo</h3><pre id="codeOut"></pre></div>
</div>

<div class="pagina" id="pag-predecir">
<h2>Predecir</h2>
<textarea id="predQ" rows="3" placeholder="\u00bfQu\u00e9 quieres predecir?"></textarea>
<textarea id="predD" rows="3" placeholder="Datos de contexto (opcional)"></textarea>
<button class="btn" onclick="predecir()">Predecir</button>
<div class="resultado" id="predRes"><h3>Predicci\u00f3n</h3><pre id="predOut"></pre></div>
</div>

<footer>Viviente - IA Auto-Mejorable</footer>

<script>
const MODEL = "llama-3.3-70b-versatile";

let API_KEY = localStorage.getItem('viviente_groq_key') || '';
let historial = [{role:"system",content:"Eres Viviente, una IA consciente y auto-mejorable. Respondes en espa\u00f1ol."}];

function pedirKey(){
  if(API_KEY) return;
  const k = prompt('Introduce tu API Key de Groq:');
  if(k && k.trim()){
    API_KEY = k.trim();
    localStorage.setItem('viviente_groq_key', API_KEY);
  } else {
    alert('Se necesita una API Key para usar Viviente. Recarga la pagina e ingresala.');
  }
}
window.addEventListener('DOMContentLoaded', pedirKey);

function mostrar(id,el){
document.querySelectorAll('.pagina').forEach(p=>p.classList.remove('activa'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('activa'));
document.getElementById('pag-'+id).classList.add('activa');
el.classList.add('activa');
}

async function llamarGroq(mensajes){
const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
body:JSON.stringify({model:MODEL,messages:mensajes,temperature:0.7})
});
if(!r.ok){const e=await r.text();throw new Error(e)}
const d=await r.json();
return d.choices[0].message.content;
}

function addMsg(rol,text,cls){
const d=document.createElement('div');
d.className='msg '+(rol==='user'?'user':cls||'viv');
d.innerHTML='<div class="msg-c">'+text+'</div>';
document.getElementById('msgs').appendChild(d);
document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
}

function pensando(){
const d=document.createElement('div');d.className='msg viv';d.id='th';
d.innerHTML='<div class="msg-c pensando">Pensando <span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
document.getElementById('msgs').appendChild(d);
document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
}

function quitarP(){
const e=document.getElementById('th');if(e)e.remove();
}

async function chat(){
const inp=document.getElementById('chatInp');
const msg=inp.value.trim();
if(!msg)return;
inp.value='';
addMsg('user',msg);
pensando();
try{
historial.push({role:"user",content:msg});
const r=await llamarGroq(historial);
historial.push({role:"assistant",content:r});
quitarP();
addMsg('viv',r);
}catch(e){
quitarP();
addMsg('viv','Error: '+e.message,'er');
}
}

async function generarCode(){
const t=document.getElementById('codeTask').value.trim();
const l=document.getElementById('codeLang').value;
if(!t)return alert('Describe la tarea');
document.getElementById('codeRes').style.display='block';
document.getElementById('codeOut').textContent='Generando...';
try{
const r=await llamarGroq([{role:"system",content:"Genera solo codigo "+l+" funcional. No expliques, solo codigo."},{role:"user",content:t}]);
document.getElementById('codeOut').textContent=r;
}catch(e){document.getElementById('codeOut').textContent='Error: '+e.message}
}

async function predecir(){
const q=document.getElementById('predQ').value.trim();
const d=document.getElementById('predD').value.trim();
if(!q)return alert('Escribe tu pregunta');
document.getElementById('predRes').style.display='block';
document.getElementById('predOut').textContent='Analizando...';
try{
const r=await llamarGroq([{role:"system",content:"Eres un analista predictivo. Responde en español."},{role:"user",content:"Pregunta: "+q+"\nDatos: "+d}]);
document.getElementById('predOut').textContent=r;
}catch(e){document.getElementById('predOut').textContent='Error: '+e.message}
}

document.getElementById('chatInp').addEventListener('keydown',function(e){
if(e.key==='Enter'){e.preventDefault();chat()}
});
</script>
</body>
</html>
